<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Sharp Parlay Builder</title>

<style>
body{background:#071b12;color:white;font-family:Arial;padding:16px}
input,button{width:100%;padding:12px;margin:7px 0;border:0;border-radius:10px}
button{background:#20c063;color:#031006;font-weight:bold}
.card{background:#123322;padding:12px;margin:10px 0;border-radius:12px}
.good{color:#37ff8b}
.bad{color:#ff7777}
.small{color:#b7d8c3;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
</style>
</head>

<body>

<h1>⚾ Sharp MLB Parlay Builder</h1>

<input id="apiKey" placeholder="Paste Odds API Key">
<button onclick="saveKey()">Save Key</button>
<button onclick="loadAll()">Load Props</button>

<h2>Filter Props</h2>
<div class="grid">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('batter_hits')">Hits</button>
<button onclick="setFilter('batter_runs_scored')">Runs</button>
<button onclick="setFilter('batter_rbis')">RBIs</button>
<button onclick="setFilter('batter_total_bases')">Total Bases</button>
<button onclick="setFilter('batter_home_runs')">HR</button>
<button onclick="setFilter('batter_hits_runs_rbis')">H+R+RBI</button>
</div>

<h2>Build Parlay</h2>
<div class="grid">
<button onclick="buildParlay(2)">2</button>
<button onclick="buildParlay(3)">3</button>
<button onclick="buildParlay(4)">4</button>
<button onclick="buildParlay(5)">5</button>
<button onclick="buildParlay(6)">6</button>
<button onclick="buildParlay(7)">7</button>
<button onclick="buildParlay(8)">8</button>
<button onclick="buildParlay(9)">9</button>
<button onclick="buildParlay(10)">10</button>
</div>

<h2>Props</h2>
<div id="props">Load data...</div>

<h2>Parlay</h2>
<div id="parlay"></div>

<script>
let props=[]
let activeFilter="all"

const MARKETS=[
"batter_hits",
"batter_runs_scored",
"batter_rbis",
"batter_total_bases",
"batter_home_runs",
"batter_hits_runs_rbis"
]

function saveKey(){
localStorage.setItem("key",document.getElementById("apiKey").value)
}

function setFilter(f){
activeFilter=f
render()
}

function imp(o){return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100)}
function dec(o){return o>0?1+o/100:1+100/Math.abs(o)}
function ev(p,o){return p*dec(o)-1}

function boost(m){
if(m==="batter_hits")return .035
if(m==="batter_total_bases")return .03
if(m==="batter_hits_runs_rbis")return .025
if(m==="batter_rbis")return .02
if(m==="batter_runs_scored")return .02
if(m==="batter_home_runs")return -.01
return 0
}

async function loadAll(){
let key=document.getElementById("apiKey").value
props=[]
document.getElementById("props").innerHTML="Loading..."

let events=await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/events?apiKey=${key}`)
events=await events.json()

for(let g of events){

let odds=await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/events/${g.id}/odds?apiKey=${key}&regions=us&markets=${MARKETS.join(",")}`)
odds=await odds.json()

if(!odds.bookmakers)continue

odds.bookmakers.forEach(b=>{
b.markets.forEach(m=>{
let map={}

m.outcomes.forEach(o=>{
let name=o.description||o.name
if(!map[name])map[name]={}
if(o.name.toLowerCase().includes("over"))map[name].o=o
if(o.name.toLowerCase().includes("under"))map[name].u=o
})

Object.keys(map).forEach(p=>{
let x=map[p]
if(!x.o||!x.u)return

let fair=imp(x.o.price)/(imp(x.o.price)+imp(x.u.price))
let model=Math.min(.95,Math.max(.01,fair+boost(m.key)))
let edge=ev(model,x.o.price)

props.push({
player:p,
gameId:g.id,
game:g.home_team+" vs "+g.away_team,
market:m.key,
line:x.o.point||"",
odds:x.o.price,
ev:edge
})
})

})
})
}

props.sort((a,b)=>b.ev-a.ev)
render()
}

function render(){
let list=activeFilter==="all"?props:props.filter(p=>p.market===activeFilter)

document.getElementById("props").innerHTML=
list.slice(0,50).map(p=>`
<div class="card">
<b>${p.player}</b><br>
${format(p.market)} O${p.line} (${p.odds})<br>
${p.game}<br>
<span class="${p.ev>0?"good":"bad"}">EV ${(p.ev*100).toFixed(1)}%</span>
</div>`).join("")
}

function buildParlay(n){
let used=new Set()
let gameCount={}
let picks=[]

for(let p of props){
if(picks.length>=n)break
if(p.ev<=0)continue
if(used.has(p.player))continue

let g=gameCount[p.gameId]||0
if(g>=2)continue

picks.push(p)
used.add(p.player)
gameCount[p.gameId]=g+1
}

document.getElementById("parlay").innerHTML=
picks.map((p,i)=>`
<div class="card">
${i+1}. ${p.player}<br>
${format(p.market)} O${p.line} (${p.odds})
</div>`).join("")
}

function format(m){
return m
.replace("batter_hits","Hits")
.replace("batter_runs_scored","Runs")
.replace("batter_rbis","RBIs")
.replace("batter_total_bases","Total Bases")
.replace("batter_home_runs","HR")
.replace("batter_hits_runs_rbis","H+R+RBI")
}
</script>

</body>
</html>
