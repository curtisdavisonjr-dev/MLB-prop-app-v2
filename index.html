<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite MLB Batter Props</title>

<style>
body{background:#071b12;color:white;font-family:Arial;padding:16px}
input,button{width:100%;padding:12px;margin:7px 0;border:0;border-radius:10px;font-size:15px}
button{background:#20c063;color:#031006;font-weight:bold}
button.active{background:#ffffff;color:#071b12}
.card{background:#123322;padding:12px;margin:10px 0;border-radius:12px}
.good{color:#37ff8b;font-weight:bold}
.bad{color:#ff7777;font-weight:bold}
.small{color:#b7d8c3;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.warn{background:#3b2f12;color:#ffe28a;padding:10px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<h1>⚾ Elite MLB Batter Props</h1>
<div class="small">Hybrid score = EV + matchup + park + line difficulty</div>

<input id="apiKey" placeholder="Paste Odds API Key">
<button onclick="saveKey()">Save Key</button>
<button onclick="loadAll()">Load Today’s Props</button>

<h2>Filter Props</h2>
<div class="grid">
<button onclick="setFilter('all',this)" class="active">All</button>
<button onclick="setFilter('batter_hits',this)">Hits</button>
<button onclick="setFilter('batter_runs_scored',this)">Runs</button>
<button onclick="setFilter('batter_rbis',this)">RBIs</button>
<button onclick="setFilter('batter_total_bases',this)">Total Bases</button>
<button onclick="setFilter('batter_home_runs',this)">Home Runs</button>
<button onclick="setFilter('batter_hits_runs_rbis',this)">H+R+RBI</button>
</div>

<h2>One-Click Parlay Builder</h2>
<div class="grid">
<button onclick="buildParlay(2)">2 Legs</button>
<button onclick="buildParlay(3)">3 Legs</button>
<button onclick="buildParlay(4)">4 Legs</button>
<button onclick="buildParlay(5)">5 Legs</button>
<button onclick="buildParlay(6)">6 Legs</button>
<button onclick="buildParlay(7)">7 Legs</button>
<button onclick="buildParlay(8)">8 Legs</button>
<button onclick="buildParlay(9)">9 Legs</button>
<button onclick="buildParlay(10)">10 Legs</button>
</div>

<h2>Top Props</h2>
<div id="props">Paste your key and tap Load Today’s Props.</div>

<h2>Your Parlay</h2>
<div id="parlay"></div>

<script>
let props = [];
let activeFilter = "all";
let gameContext = {};
let playerTeamMap = {};

const MARKETS = [
  "batter_hits",
  "batter_runs_scored",
  "batter_rbis",
  "batter_total_bases",
  "batter_home_runs",
  "batter_hits_runs_rbis",
  "batter_home_runs_alternate",
  "batter_total_bases_alternate",
  "batter_hits_alternate"
];

document.getElementById("apiKey").value = localStorage.getItem("ODDS_KEY") || "";

function saveKey(){
  const key = document.getElementById("apiKey").value.trim();
  localStorage.setItem("ODDS_KEY", key);
  alert("Key saved");
}

function setFilter(filter, btn){
  activeFilter = filter;
  document.querySelectorAll(".grid button").forEach(b => b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  render();
}

function todayISO(){
  return new Date().toISOString().slice(0,10);
}

function impliedProb(odds){
  odds = Number(odds);
  return odds > 0 ? 100 / (odds + 100) : Math.abs(odds) / (Math.abs(odds) + 100);
}

function decimalOdds(odds){
  odds = Number(odds);
  return odds > 0 ? 1 + odds / 100 : 1 + 100 / Math.abs(odds);
}

function noVigProb(overOdds, underOdds){
  const over = impliedProb(overOdds);
  const under = impliedProb(underOdds);
  return over / (over + under);
}

function calcEV(modelProb, odds){
  return modelProb * decimalOdds(odds) - 1;
}

function marketGroup(market){
  if(market.includes("home_runs")) return "batter_home_runs";
  if(market.includes("total_bases")) return "batter_total_bases";
  if(market.includes("hits_runs_rbis")) return "batter_hits_runs_rbis";
  if(market.includes("runs_scored")) return "batter_runs_scored";
  if(market.includes("rbis")) return "batter_rbis";
  if(market.includes("hits")) return "batter_hits";
  return market;
}

function normalizeName(name){
  return String(name || "")
    .toLowerCase()
    .replace(/[^a-z ]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

async function loadMLBContext(){
  gameContext = {};
  playerTeamMap = {};

  const date = todayISO();

  try{
    const scheduleUrl =
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher,venue,team`;

    const scheduleRes = await fetch(scheduleUrl);
    const scheduleData = await scheduleRes.json();

    const games = scheduleData.dates?.[0]?.games || [];

    games.forEach(g => {
      const homeTeam = g.teams?.home?.team?.name || "";
      const awayTeam = g.teams?.away?.team?.name || "";

      const homePitcher = g.teams?.home?.probablePitcher?.fullName || "TBD";
      const awayPitcher = g.teams?.away?.probablePitcher?.fullName || "TBD";

      const venue = g.venue?.name || "";

      let parkBoost = 0;
      const hitterParks = [
        "Coors Field",
        "Great American Ball Park",
        "Fenway Park",
        "Citizens Bank Park",
        "Yankee Stadium",
        "Globe Life Field"
      ];

      if(hitterParks.some(v => venue.includes(v))) parkBoost = 4;

      gameContext[g.gamePk] = {
        homeTeam,
        awayTeam,
        homePitcher,
        awayPitcher,
        venue,
        parkBoost
      };

      gameContext[`${awayTeam} @ ${homeTeam}`] = gameContext[g.gamePk];
      gameContext[`${homeTeam} vs ${awayTeam}`] = gameContext[g.gamePk];
    });

    const teamsRes = await fetch(`https://statsapi.mlb.com/api/v1/teams?sportId=1&season=2026`);
    const teamsData = await teamsRes.json();

    const teams = teamsData.teams || [];

    for(const team of teams){
      try{
        const rosterRes = await fetch(
          `https://statsapi.mlb.com/api/v1/teams/${team.id}/roster?rosterType=active&season=2026`
        );
        const rosterData = await rosterRes.json();

        (rosterData.roster || []).forEach(p => {
          const playerName = p.person?.fullName || "";
          if(playerName){
            playerTeamMap[normalizeName(playerName)] = team.name;
          }
        });
      }catch(e){}
    }

  }catch(e){
    console.log("MLB context failed", e);
  }
}

function getOpponentPitcher(player, game){
  const playerTeam = playerTeamMap[normalizeName(player)];
  const ctx = gameContext[game];

  if(!ctx || !playerTeam){
    return {
      playerTeam: playerTeam || "Unknown team",
      pitcher: "TBD",
      venue: ctx?.venue || "",
      parkBoost: ctx?.parkBoost || 0
    };
  }

  let pitcher = "TBD";

  if(playerTeam === ctx.homeTeam){
    pitcher = ctx.awayPitcher;
  }else if(playerTeam === ctx.awayTeam){
    pitcher = ctx.homePitcher;
  }

  return {
    playerTeam,
    pitcher,
    venue: ctx.venue,
    parkBoost: ctx.parkBoost
  };
}

function matchupScore(market, odds, line, matchup){
  const group = marketGroup(market);
  let score = 50;

  if(group === "batter_hits") score += 9;
  if(group === "batter_total_bases") score += 8;
  if(group === "batter_hits_runs_rbis") score += 7;
  if(group === "batter_rbis") score += 5;
  if(group === "batter_runs_scored") score += 5;
  if(group === "batter_home_runs") score += 2;

  if(matchup.pitcher && matchup.pitcher !== "TBD") score += 6;
  if(matchup.playerTeam && matchup.playerTeam !== "Unknown team") score += 4;
  if(matchup.parkBoost) score += matchup.parkBoost;

  if(Number(odds) > 250) score -= 8;
  if(Number(odds) > 400) score -= 12;

  if(Number(line) >= 2.5 && group !== "batter_hits_runs_rbis") score -= 5;
  if(Number(line) >= 3.5) score -= 8;

  if(market.includes("alternate")) score -= 6;

  return Math.max(1, Math.min(100, score));
}

function eliteModelProb(fair, market, odds, line, matchup){
  let boost = 0;

  const group = marketGroup(market);

  if(group === "batter_hits") boost += 0.025;
  if(group === "batter_total_bases") boost += 0.020;
  if(group === "batter_hits_runs_rbis") boost += 0.018;
  if(group === "batter_rbis") boost += 0.012;
  if(group === "batter_runs_scored") boost += 0.012;
  if(group === "batter_home_runs") boost -= 0.006;

  if(matchup.pitcher && matchup.pitcher !== "TBD") boost += 0.006;
  if(matchup.parkBoost) boost += matchup.parkBoost / 500;

  if(Number(odds) > 250) boost -= 0.015;
  if(Number(odds) > 400) boost -= 0.02;

  if(market.includes("alternate")) boost -= 0.012;

  if(Number(line) >= 2.5 && group !== "batter_hits_runs_rbis") boost -= 0.01;
  if(Number(line) >= 3.5) boost -= 0.015;

  return Math.max(0.01, Math.min(0.95, fair + boost));
}

function hybridScore(ev, matchup){
  const evScore = Math.max(0, Math.min(100, ev * 400));
  return Math.round((evScore * 0.60) + (matchup * 0.40));
}

async function loadAll(){
  const key = document.getElementById("apiKey").value.trim();

  if(!key){
    alert("Paste your Odds API key first");
    return;
  }

  props = [];
  document.getElementById("props").innerHTML = "Loading MLB context...";
  document.getElementById("parlay").innerHTML = "";

  await loadMLBContext();

  document.getElementById("props").innerHTML = "Loading today’s prop odds...";

  try{
    const eventsRes = await fetch(
      `https://api.the-odds-api.com/v4/sports/baseball_mlb/events?apiKey=${key}`
    );

    const events = await eventsRes.json();

    if(!Array.isArray(events)){
      document.getElementById("props").innerHTML =
        `<div class="warn">Could not load games. Check API key or Odds API limit.</div>`;
      return;
    }

    for(const game of events){
      const gameLabel = `${game.away_team} @ ${game.home_team}`;

      document.getElementById("props").innerHTML =
        `Loading props: ${gameLabel}...`;

      const oddsUrl =
        `https://api.the-odds-api.com/v4/sports/baseball_mlb/events/${game.id}/odds` +
        `?apiKey=${key}&regions=us&markets=${MARKETS.join(",")}&oddsFormat=american`;

      const oddsRes = await fetch(oddsUrl);
      const oddsData = await oddsRes.json();

      if(!oddsData.bookmakers) continue;

      oddsData.bookmakers.forEach(book => {
        book.markets.forEach(market => {
          const grouped = {};

          market.outcomes.forEach(outcome => {
            const player = outcome.description || outcome.name || "";
            const label = String(outcome.name || "").toLowerCase();

            if(!player) return;
            if(!grouped[player]) grouped[player] = {};

            if(label.includes("over")) grouped[player].over = outcome;
            if(label.includes("under")) grouped[player].under = outcome;
          });

          Object.keys(grouped).forEach(player => {
            const pair = grouped[player];

            if(!pair.over || !pair.under) return;
            if(pair.over.price === undefined || pair.under.price === undefined) return;

            const matchup = getOpponentPitcher(player, gameLabel);

            const fair = noVigProb(pair.over.price, pair.under.price);
            const model = eliteModelProb(
              fair,
              market.key,
              pair.over.price,
              pair.over.point,
              matchup
            );

            const edge = calcEV(model, pair.over.price);
            const mScore = matchupScore(
              market.key,
              pair.over.price,
              pair.over.point,
              matchup
            );

            const score = hybridScore(edge, mScore);

            props.push({
              player,
              gameId: game.id,
              game: gameLabel,
              market: market.key,
              group: marketGroup(market.key),
              book: book.title,
              line: pair.over.point ?? "",
              odds: pair.over.price,
              fair,
              model,
              ev: edge,
              matchupScore: mScore,
              hybridScore: score,
              playerTeam: matchup.playerTeam,
              opponentPitcher: matchup.pitcher,
              venue: matchup.venue
            });
          });
        });
      });
    }

    props.sort((a,b) => b.hybridScore - a.hybridScore);
    render();

  }catch(err){
    document.getElementById("props").innerHTML =
      `<div class="warn">Error loading props. Check key, internet, or Odds API player-props access.</div>`;
  }
}

function getFilteredProps(){
  if(activeFilter === "all") return props;
  return props.filter(p => p.group === activeFilter);
}

function render(){
  const list = getFilteredProps();

  if(!props.length){
    document.getElementById("props").innerHTML = "No props loaded yet.";
    return;
  }

  if(!list.length){
    document.getElementById("props").innerHTML =
      `<div class="warn">No ${format(activeFilter)} props found. Try All or another market.</div>`;
    return;
  }

  document.getElementById("props").innerHTML =
    list.slice(0,75).map((p,i)=>`
      <div class="card">
        <strong>${i+1}. ${p.player}</strong>
        <div>${format(p.market)} Over ${p.line} (${p.odds})</div>
        <div class="small">${p.game}</div>
        <div class="small">Team: ${p.playerTeam || "Unknown"} • Vs pitcher: ${p.opponentPitcher || "TBD"}</div>
        <div class="small">${p.book}${p.venue ? " • " + p.venue : ""}</div>
        <div>Hybrid Score: <span class="good">${p.hybridScore}</span></div>
        <div>Matchup Score: ${p.matchupScore}</div>
        <div>Model: ${(p.model*100).toFixed(1)}%</div>
        <div>Fair: ${(p.fair*100).toFixed(1)}%</div>
        <div class="${p.ev > 0 ? "good" : "bad"}">EV: ${(p.ev*100).toFixed(2)}%</div>
      </div>
    `).join("");
}

function buildParlay(legs){
  const selected = [];
  const usedPlayers = new Set();
  const usedMarkets = {};
  const gameCounts = {};

  const candidates = getFilteredProps()
    .filter(p => p.hybridScore >= 45)
    .sort((a,b) => b.hybridScore - a.hybridScore);

  for(const p of candidates){
    if(selected.length >= legs) break;

    const nameKey = normalizeName(p.player);

    // HARD RULE: no repeating names
    if(usedPlayers.has(nameKey)) continue;

    const gameCount = gameCounts[p.gameId] || 0;
    if(gameCount >= 2) continue;

    usedMarkets[p.group] = usedMarkets[p.group] || 0;

    // In All mode, avoid one prop type dominating the whole parlay
    if(activeFilter === "all" && usedMarkets[p.group] >= 3) continue;

    selected.push(p);
    usedPlayers.add(nameKey);
    gameCounts[p.gameId] = gameCount + 1;
    usedMarkets[p.group]++;
  }

  if(selected.length < legs){
    document.getElementById("parlay").innerHTML =
      `<div class="warn">Only found ${selected.length} eligible legs. Try a smaller parlay or switch to All.</div>`;
    return;
  }

  let decimal = 1;
  selected.forEach(p => decimal *= decimalOdds(p.odds));

  const american =
    decimal >= 2
      ? Math.round((decimal - 1) * 100)
      : Math.round(-100 / (decimal - 1));

  document.getElementById("parlay").innerHTML = `
    <div class="card">
      <strong>${legs}-Leg Hybrid Parlay</strong>
      <div class="good">Approx payout: ${american > 0 ? "+" : ""}${american}</div>
      <div class="small">No duplicate players • Max 2 legs per game • Ranked by EV + matchup</div>
    </div>
    ${selected.map((p,i)=>`
      <div class="card">
        <strong>${i+1}. ${p.player}</strong>
        <div>${format(p.market)} Over ${p.line} (${p.odds})</div>
        <div class="small">${p.game} • ${p.book}</div>
        <div class="small">Vs pitcher: ${p.opponentPitcher || "TBD"}</div>
        <div>Hybrid Score: <span class="good">${p.hybridScore}</span></div>
        <div>Matchup Score: ${p.matchupScore}</div>
        <div class="${p.ev > 0 ? "good" : "bad"}">EV ${(p.ev*100).toFixed(2)}%</div>
      </div>
    `).join("")}
  `;
}

function format(m){
  if(m === "all") return "All";
  return m
    .replace("batter_hits_runs_rbis","Hits + Runs + RBIs")
    .replace("batter_total_bases_alternate","Alt Total Bases")
    .replace("batter_home_runs_alternate","Alt Home Runs")
    .replace("batter_hits_alternate","Alt Hits")
    .replace("batter_total_bases","Total Bases")
    .replace("batter_runs_scored","Runs")
    .replace("batter_home_runs","Home Runs")
    .replace("batter_hits","Hits")
    .replace("batter_rbis","RBIs");
}
</script>

</body>
</html>
